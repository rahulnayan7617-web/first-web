<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 Admin Panel - Rahul's Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }

        .admin-box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #333;
            text-align: center;
        }

        .admin-login {
            max-width: 400px;
            margin: 0 auto;
            padding: 20px;
            background: #fff3cd;
            border-radius: 10px;
        }

        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .admin-btn {
            width: 100%;
            padding: 15px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #667eea;
            color: white;
        }

        .delete-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin: 20px 0;
        }

        .stat {
            flex: 1;
            background: #e3f2fd;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="admin-box">
        <!-- ADMIN LOGIN -->
        <div id="adminLogin">
            <h2 style="text-align:center;">🔑 Admin Login</h2>
            <div class="admin-login">
                <input type="password" id="adminPass" placeholder="Enter Admin Password">
                <button class="admin-btn" onclick="adminLogin()">Login to Admin Panel</button>
            </div>
        </div>

        <!-- ADMIN DASHBOARD (HIDDEN) -->
        <div id="adminDashboard" style="display:none;">
            <h1>👨‍💼 Admin Panel</h1>
            <p>Manage all users from your main website (index.html)</p>

            <div class="stats">
                <div class="stat">
                    <h2 id="totalUsers">0</h2>
                    <p>Total Users</p>
                </div>
                <div class="stat">
                    <h2 id="activeUsers">0</h2>
                    <p>Active Today</p>
                </div>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>User ID</th>
                        <th>Joined Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="usersTable"></tbody>
            </table>

            <div style="margin-top:20px;">
                <button class="admin-btn" onclick="exportUsers()" style="background:#007bff; width:auto;">📊 Export
                    CSV</button>
                <button class="admin-btn" onclick="clearAll()" style="background:#dc3545; width:auto;">🗑️ Delete
                    All</button>
            </div>
        </div>
    </div>
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js';
        import { getAuth, signInWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js';

        const firebaseConfig = {
            apiKey: "AIzaSyDEF3w3xaLBQw3ctkdikywqiXy9hvr00Bg",
            authDomain: "rahul-sfirst-web.firebaseapp.com",
            databaseURL: "https://rahul-sfirst-web-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "rahul-sfirst-web",
            storageBucket: "rahul-sfirst-web.firebasestorage.app",
            messagingSenderId: "813239852248",
            appId: "1:813239852248:web:91d29ed494917ad6e30bad",
            measurementId: "G-74DMWXDQRX"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Attached to 'window' so your HTML buttons can trigger them
        window.adminLogin = function () {
            const password = document.getElementById('adminPass').value;
            signInWithEmailAndPassword(auth, 'rahulnayan010@gmail.com', password)
                .then((userCredential) => {
                    document.getElementById('adminLogin').style.display = 'none';
                    document.getElementById('adminDashboard').style.display = 'block';
                    window.loadUsers();
                })
                .catch((error) => {
                    alert('❌ Invalid password or user does not exist in Firebase!');
                    console.error(error);
                });
        }

        function getUsers() {
            return JSON.parse(localStorage.getItem('websiteUsers')) || [];
        }

        window.loadUsers = function () {
            const users = getUsers();
            document.getElementById('totalUsers').textContent = users.length;
            const tbody = document.getElementById('usersTable');
            tbody.innerHTML = '';

            users.forEach((user, index) => {
                const row = tbody.insertRow();
                row.innerHTML = `
        <td><strong>${user.userId}</strong></td>
        <td>${new Date(user.joined).toLocaleDateString()}</td>
        <td><button class="delete-btn" onclick="window.deleteUser(${index})">Delete</button></td>
      `;
            });
        }

        window.deleteUser = function (index) {
            if (confirm('Delete this user?')) {
                const users = getUsers();
                users.splice(index, 1);
                localStorage.setItem('websiteUsers', JSON.stringify(users));
                window.loadUsers();
            }
        }

        window.clearAll = function () {
            if (confirm('⚠️ Delete ALL users? Cannot undo!')) {
                localStorage.removeItem('websiteUsers');
                window.loadUsers();
            }
        }

        window.exportUsers = function () {
            const users = getUsers();
            const csv = 'UserID,JoinedDate\n' + users.map(u => `${u.userId},"${u.joined}"`).join('\n');
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'users.csv';
            a.click();
        }
    </script>
</body>

</html>
