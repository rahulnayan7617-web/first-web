<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Rahul Nayan's first website with Firebase login">
    <title>Rahul Nayan - Protected Website</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: Arial, sans-serif; 
            padding: 20px; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        #loginArea { 
            position: fixed; top: 20px; right: 20px; z-index: 1000; 
        }
        .login-btn, .logout-btn {
            padding: 12px 24px; background: #667eea; color: white; 
            border: none; border-radius: 25px; cursor: pointer; 
            font-weight: bold; font-size: 14px;
        }
        .logout-btn { background: #ff6b6b; }
        .logout-btn:hover { background: #ff5252; }
        #mainContent { 
            max-width: 1000px; margin: 80px auto 20px; 
            background: white; padding: 30px; border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: none;
        }
        .modal {
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; background: rgba(0,0,0,0.7); 
            z-index: 9999; backdrop-filter: blur(5px);
        }
        .modal-content {
            background: white; width: 90%; max-width: 420px; 
            margin: 100px auto; padding: 40px; border-radius: 20px; 
            position: relative; box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .close { 
            position: absolute; right: 20px; top: 15px; 
            font-size: 30px; cursor: pointer; color: #999; 
        }
        .close:hover { color: #333; }
        input {
            width: 100%; padding: 18px; margin: 12px 0; 
            border: 2px solid #e1e5e9; border-radius: 12px; 
            font-size: 16px; transition: all 0.3s;
        }
        input:focus {
            outline: none; border-color: #667eea; 
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        button {
            width: 100%; padding: 18px; margin: 12px 0; 
            border: none; border-radius: 12px; font-size: 16px; 
            font-weight: bold; cursor: pointer; transition: all 0.3s;
        }
        .login-btn { background: #667eea; color: white; }
        .login-btn:hover { background: #5a67d8; transform: translateY(-2px); }
        .register-btn { background: #28a745; color: white; }
        .register-btn:hover { background: #218838; transform: translateY(-2px); }
        .switch { 
            text-align: center; cursor: pointer; 
            color: #667eea; margin-top: 20px; font-weight: 500;
        }
        .switch:hover { text-decoration: underline; }
        .hidden { display: none !important; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th, td { padding: 12px; text-align: left; border: 1px solid #ddd; }
        th { background: #667eea; color: white; }
        img { max-width: 100%; height: auto; border-radius: 10px; }
    </style>
</head>
<body>
    <!-- LOGIN BUTTON (Top Right) -->
    <div id="loginArea">
        <button class="login-btn" onclick="showLogin()">🔐 Login</button>
    </div>

    <!-- PROTECTED MAIN CONTENT (Hidden until login) -->
    <div id="mainContent">
        <h1>Welcome to my first website! <h4>by Rahul Nayan</h4></h1>
        <p style="background-color: rgb(129, 155, 14); padding: 15px; border-radius: 8px; color: white;">
            This is a paragraph on my first webpage.
        </p>

        <!-- YOUR COOL TABLE -->
        <table>
            <tr><th colspan="6">🚀 Weblinks</th></tr>
            <tr>
                <td><img width="30" height="30" src="download.webp" alt="Google"><a target="_blank" href="https://www.google.com"> Google</a></td>
                <td><img width="30" height="30" src="instagram.webp" alt="Instagram"><a target="_blank" href="https://www.instagram.com"> Instagram</a></td>
                <td><img width="30" height="30" src="free fire image.webp" alt="Free Fire"><a target="_blank" href="https://ff.garena.com"> Free Fire</a></td>
                <td><img width="30" height="30" src="chat.webp" alt="ChatGPT"><a target="_blank" href="https://chatgpt.com"> ChatGPT</a></td>
                <td><img width="30" height="30" src="perplexity.webp" alt="Perplexity"><a target="_blank" href="https://www.perplexity.ai"> Perplexity</a></td>
                <td><a href="https://github.com" target="_blank">🐙 GitHub</a></td>
            </tr>
        </table>

        <!-- YOUR ANIME IMAGE -->
        <img width="500" height="500" src="WhatsApp Image 2024-01-19 at 8.21.37 AM.jpeg" alt="Anime" style="margin: 20px 0;">
        
        <!-- YOUR FORM -->
        <h1>📝 Form</h1>
        <form style="max-width: 500px;">
            <label for="yourname" style="display: block; margin-bottom: 10px; font-weight: bold;">Enter your name:</label>
            <input type="text" id="yourname" placeholder="Enter your name" autofocus required style="margin-bottom: 20px;">
            <div style="display: flex; gap: 15px;">
                <label><input type="radio" name="gender" value="male"> Male</label>
                <label><input type="radio" name="gender" value="female"> Female</label>
            </div>
        </form>
    </div>

    <!-- 🔥 BEAUTIFUL LOGIN MODAL -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeLogin()">&times;</span>
            
            <!-- LOGIN FORM -->
            <div id="loginForm">
                <h2 style="margin-bottom: 25px; text-align: center; color: #333;">🔐 Welcome Back</h2>
                <input id="email" type="email" placeholder="📧 Enter your email">
                <input id="password" type="password" placeholder="🔒 Enter your password">
                <button class="login-btn" onclick="login()">Sign In</button>
                <div class="switch" onclick="showRegister()">Don't have account? 📝 Register</div>
            </div>

            <!-- REGISTER FORM -->
            <div id="registerForm" class="hidden">
                <h2 style="margin-bottom: 25px; text-align: center; color: #333;">📝 Create Account</h2>
                <input id="regEmail" type="email" placeholder="📧 Enter your email">
                <input id="regPassword" type="password" placeholder="🔒 Create password (6+ chars)">
                <button class="register-btn" onclick="register()">Create Account</button>
                <div class="switch" onclick="showLogin()">Already have account? 🔐 Login</div>
            </div>
        </div>
    </div>

    <!-- 🔥 YOUR FIREBASE CONFIG + LOGIN SYSTEM -->
    <script type="module">
        // YOUR FIREBASE CONFIG (UPDATED FOR v12.7.0)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDEF3w3xaLBQw3ctkdikywqiXy9hvr00Bg",
            authDomain: "rahul-sfirst-web.firebaseapp.com",
            databaseURL: "https://rahul-sfirst-web-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "rahul-sfirst-web",
            storageBucket: "rahul-sfirst-web.firebasestorage.app",
            messagingSenderId: "813239852248",
            appId: "1:813239852248:web:91d29ed494917ad6e30bad",
            measurementId: "G-74DMWXDQRX"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // 🌟 GLOBAL FUNCTIONS (for onclick)
        window.showLogin = () => {
            document.getElementById('loginModal').style.display = 'block';
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('registerForm').classList.add('hidden');
        };

        window.closeLogin = () => {
            document.getElementById('loginModal').style.display = 'none';
        };

        window.showRegister = () => {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
        };

        window.showLoginForm = () => {
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('registerForm').classList.add('hidden');
        };

        // 📝 REGISTER NEW USER
        window.register = async () => {
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            
            if (!email || !password || password.length < 6) {
                return alert('❌ Email & Password (6+ chars) required!');
            }
            
            try {
                await createUserWithEmailAndPassword(auth, email, password);
                alert('✅ Account created! Please login.');
                document.getElementById('regEmail').value = '';
                document.getElementById('regPassword').value = '';
                showLoginForm();
            } catch (error) {
                if (error.code === 'auth/email-already-in-use') {
                    alert('❌ Email already registered! Login instead.');
                } else {
                    alert('❌ Registration failed: ' + error.message);
                }
            }
        };

        // 🔐 LOGIN USER
        window.login = async () => {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                return alert('❌ Please enter email & password!');
            }
            
            try {
                await signInWithEmailAndPassword(auth, email, password);
                document.getElementById('email').value = '';
                document.getElementById('password').value = '';
            } catch (error) {
                if (error.code === 'auth/wrong-password' || error.code === 'auth/user-not-found') {
                    alert('❌ Wrong email or password!');
                } else {
                    alert('❌ Login failed: ' + error.message);
                }
            }
        };

        // 🚪 LOGOUT
        window.logout = async () => {
            try {
                await signOut(auth);
            } catch (error) {
                console.error('Logout error:', error);
            }
        };

        // ✨ AUTO LOGIN CHECK (runs on page load)
        onAuthStateChanged(auth, (user) => {
            const loginArea = document.getElementById('loginArea');
            const mainContent = document.getElementById('mainContent');
            
            if (user) {
                // USER LOGGED IN
                loginArea.innerHTML = `
                    <span style="color: white; margin-right: 10px;">👋 Welcome ${user.email.split('@')[0]}!</span>
                    <button class="logout-btn" onclick="logout()">Logout</button>
                `;
                mainContent.style.display = 'block';
            } else {
                // NO USER LOGGED IN
                loginArea.innerHTML = `
                    <button class="login-btn" onclick="showLogin()">🔐 Login</button>
                `;
                mainContent.style.display = 'none';
            }
        });

        // 🎯 CLOSE MODAL ON OUTSIDE CLICK
        document.getElementById('loginModal').onclick = (e) => {
            if (e.target === document.getElementById('loginModal')) {
                closeLogin();
            }
        };
    </script>
</body>
</html>
